services:

  postgres:
    image: postgres:16-alpine
    container_name: commercecore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commercecore_db}
      POSTGRES_USER: ${POSTGRES_USER:-commercecore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commercecore_secret}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - commercecore_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commercecore} -d ${POSTGRES_DB:-commercecore_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: commercecore-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - commercecore_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  commercecore_pg_data:
    driver: local
  commercecore_redis_data:
    driver: local
