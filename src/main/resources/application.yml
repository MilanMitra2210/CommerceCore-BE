# ==============================================================================
# CommerceCore API — Shared Configuration
# ==============================================================================
# Profile-specific overrides in application-{profile}.yml
# ==============================================================================

spring:
  application:
    name: commercecore-api

  profiles:
    active: dev

  # ---- JPA / Hibernate ----
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ---- Server ----
server:
  port: 8080
  servlet:
    context-path: /api/v1

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ---- Swagger / OpenAPI ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
