# ==============================================================================
# CommerceCore API — Shared Configuration
# ==============================================================================
# Profile-specific overrides in application-{profile}.yml
# ==============================================================================

spring:
  application:
    name: commercecore-api

  profiles:
    active: dev

  # ---- JPA / Hibernate ----
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # ---- Multipart Upload Limits ----
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  mvc:
    multipart:
      resolve-lazily: true

# ---- Server ----
server:
  port: 8080
  servlet:
    context-path: /api/v1

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ---- Swagger / OpenAPI ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ---- Custom Application Properties ----
app:
  jwt:
    # Fallback key generated for local development. In production, this must be set via environment variable.
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWNvbW1lcmNlY29yZS1iYWNrZW5kLXBsYXRmb3JtLWRldmVsb3BtZW50LXVzZQ==}
    expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}        # 15 minutes
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days

